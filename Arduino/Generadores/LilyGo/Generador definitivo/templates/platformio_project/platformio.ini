; PlatformIO - MinerGuard T-Echo 6 + GPS real en HR7/HR8 y estado en HR20
;
; Payload 46 bytes:
;   0..35  = estructura MinerGuard original
;   36..39 = latitud * 1e6, int32 BE
;   40..43 = longitud * 1e6, int32 BE
;   44     = satélites
;   45     = HDOP * 10
;
; El bit 0x10 de flags indica GPS válido.
; Node-RED traduce ese bit a HR20: 0=NO_GPS, 1=SI_GPS.
; Mantiene DevEUI/AppKey originales.

[platformio]
default_envs = minerguard_techo_6_gps_hr20

[env:minerguard_techo_6_gps_hr20]
platform = nordicnrf52@10.9.0
board = nrf52840_dk_adafruit
framework = arduino
upload_protocol = nrfutil
monitor_speed = 115200
monitor_dtr = 0
monitor_rts = 0
lib_ldf_mode = chain+

lib_deps =
    mcci-catena/MCCI LoRaWAN LMIC library@5.0.1
    mikalhart/TinyGPSPlus@1.0.3
    zinggjm/GxEPD@3.1.3

build_flags =
    -D CFG_DEBUG=0
    -D ARDUINO_LMIC_PROJECT_CONFIG_H_SUPPRESS
    -D LMIC_LORAWAN_SPEC_VERSION=LMIC_LORAWAN_SPEC_VERSION_1_0_2
    -D CFG_us915=1
    -D CFG_sx1262_radio=1
    -D DISABLE_PING
    -D DISABLE_BEACONS
    -D LMIC_DEBUG_LEVEL=0
